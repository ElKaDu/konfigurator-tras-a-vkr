<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Trasa jako sled úseků, sdílené úseky</title>
<desc>Trasa do USA a trasa do Kataru sdílejí úsek z ČR do Paříže; USA navíc sdílí úsek Paříž do US hubu napříč státy.</desc>
<style>
svg{--bd:rgba(0,0,0,.3)}
.th{font:500 15px system-ui,sans-serif;fill:#2C2C2A}
.t{font:400 14px system-ui,sans-serif;fill:#2C2C2A}
.ts{font:400 12px system-ui,sans-serif;fill:#5F5E5A}
.c-purple rect{fill:#EEEDFE;stroke:#534AB7;stroke-width:1}
.c-purple .th{fill:#3C3489}.c-purple .ts{fill:#534AB7}
.c-purple circle{fill:#534AB7}
.t.dot{fill:#5F5E5A}
</style>

<text x="20" y="26" class="th">Trasa = sled úseků · stejný úsek sdílí víc tras</text>
<g class="c-purple"><rect x="20" y="40" width="14" height="14" rx="3"/></g>
<text x="42" y="51" class="ts">sdílený úsek (definovaný jednou)</text>

<text x="20" y="92" class="t">Trasa → USA</text>

<g class="c-purple">
<rect x="20" y="100" width="150" height="64" rx="10"/>
<text x="34" y="124" class="th">ČR → Paříž</text>
<circle cx="36" cy="146" r="4"/><circle cx="56" cy="146" r="4"/><circle cx="76" cy="146" r="4"/>
<text x="92" y="150" class="ts">milníky</text>
</g>
<g class="c-purple">
<rect x="186" y="100" width="150" height="64" rx="10"/>
<text x="200" y="124" class="th">Paříž → US hub</text>
<circle cx="202" cy="146" r="4"/><circle cx="222" cy="146" r="4"/>
<text x="238" y="150" class="ts">+ odlet z hubu</text>
</g>
<g>
<rect x="352" y="100" width="150" height="64" rx="10" fill="none" stroke="var(--bd)" stroke-width="1.5"/>
<text x="366" y="124" class="t">US hub → stát</text>
<circle cx="368" cy="146" r="4" class="t dot"/><circle cx="388" cy="146" r="4" class="t dot"/>
<text x="404" y="150" class="ts">unikátní</text>
</g>

<text x="20" y="206" class="t">Trasa → Katar</text>

<g class="c-purple">
<rect x="20" y="214" width="150" height="64" rx="10"/>
<text x="34" y="238" class="th">ČR → Paříž</text>
<circle cx="36" cy="260" r="4"/><circle cx="56" cy="260" r="4"/><circle cx="76" cy="260" r="4"/>
<text x="92" y="264" class="ts">tentýž úsek</text>
</g>
<g>
<rect x="186" y="214" width="150" height="64" rx="10" fill="none" stroke="var(--bd)" stroke-width="1.5"/>
<text x="200" y="238" class="t">Paříž → Dauhá</text>
<circle cx="202" cy="260" r="4" class="t dot"/><circle cx="222" cy="260" r="4" class="t dot"/>
<text x="238" y="264" class="ts">unikátní</text>
</g>
</svg>
