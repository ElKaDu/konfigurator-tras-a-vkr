<svg width="100%" viewBox="0 0 680 330" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Jak se tracking záznam napáruje na checkpoint přes Match a jak se vyhodnotí kotva</title>
<desc>Checkpoint nese Match; engine najde v trackingu záznam, který Match splní. Kotva čte čas toho záznamu a přičte offset.</desc>
<style>
svg{--bd:rgba(0,0,0,.3)}
.th{font:500 15px system-ui,sans-serif;fill:#2C2C2A}
.t{font:400 14px system-ui,sans-serif;fill:#2C2C2A}
.ts{font:400 12px system-ui,sans-serif;fill:#5F5E5A}
.c-purple rect{fill:#EEEDFE;stroke:#534AB7;stroke-width:1}
.c-purple .th{fill:#3C3489}.c-purple .ts{fill:#534AB7}
.c-gray rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:1}
.c-gray .th{fill:#2C2C2A}.c-gray .ts{fill:#5F5E5A}
</style>
<defs><marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#888780"/></marker></defs>

<text x="20" y="24" class="th">Záznam ↔ checkpoint přes Match · pak kotva čte reálný čas</text>

<text x="20" y="52" class="ts">Checkpointy na složené trase (Úsek 1 + Úsek 2)</text>
<text x="420" y="52" class="ts">Záznamy z trackingu (activities[])</text>

<g class="c-purple">
<rect x="20" y="62" width="220" height="62" rx="10"/>
<text x="34" y="86" class="th">Přílet do Paříže</text>
<text x="34" y="108" class="ts">match: Paříž · ARRIVAL</text>
</g>
<g class="c-purple">
<rect x="20" y="146" width="220" height="62" rx="10"/>
<text x="34" y="170" class="th">Odlet z Paříže</text>
<text x="34" y="192" class="ts">match: Paříž · DEPARTURE</text>
</g>

<g class="c-gray">
<rect x="420" y="62" width="240" height="62" rx="10"/>
<text x="434" y="86" class="th">02:50 · Paříž</text>
<text x="434" y="108" class="ts">status ARRIVAL</text>
</g>
<g class="c-gray">
<rect x="420" y="146" width="240" height="62" rx="10"/>
<text x="434" y="170" class="th">05:10 · Paříž</text>
<text x="434" y="192" class="ts">status DEPARTURE</text>
</g>

<line x1="242" y1="93" x2="418" y2="93" stroke="#888780" stroke-width="1.5" marker-end="url(#ar)"/>
<text x="330" y="86" class="ts" text-anchor="middle">Match</text>
<line x1="242" y1="177" x2="418" y2="177" stroke="#888780" stroke-width="1.5" marker-end="url(#ar)"/>
<text x="330" y="170" class="ts" text-anchor="middle">Match</text>

<rect x="20" y="236" width="640" height="74" rx="10" fill="none" stroke="var(--bd)" stroke-width="1"/>
<text x="34" y="262" class="t">Kotva na „Odlet": má nastat do 2 h od Příletu</text>
<text x="34" y="286" class="ts">reálný Přílet 02:50  +  2 h  =  04:50 (mez)   →   reálný Odlet 05:10   →   o 20 min později = odchylka</text>
</svg>
